version: 0.2

phases:
  install:
    commands:
      - echo Entered the install phase...
      - wget https://golang.org/dl/go1.23.3.linux-amd64.tar.gz
      - tar -xzf go1.23.3.linux-amd64.tar.gz
      - mv go /usr/local
      - export GOROOT=/usr/local/go
      - export GOPATH=$HOME/go
      - export PATH=$GOPATH/bin:$GOROOT/bin:$PATH
      - go version
      - yum install asciidoctor -y
      - mkdir -p $HOME/src
      - cd $HOME/src
      - git clone --branch v0.139.4 --depth 1 https://github.com/gohugoio/hugo.git
      - cd hugo
      - go install --tags extended
      - hugo version
    finally:
      - echo Installation done
  build:
    commands:
      - echo Building...
      - echo Build started on `date`
      - cd $CODEBUILD_SRC_DIR
      - export PATH=$HOME/go/bin:$PATH
      - hugo --quiet --minify
      - echo Uploading with optimized cache headers...
      # Sync files with appropriate cache headers (no --delete on individual syncs to avoid conflicts)
      - aws s3 sync --exclude "*" --include "*.html" --cache-control "public, max-age=3600" docs/ s3://trmccormick.com
      - aws s3 sync --exclude "*" --include "*.css" --cache-control "public, max-age=31536000, immutable" docs/ s3://trmccormick.com
      - aws s3 sync --exclude "*" --include "*.js" --cache-control "public, max-age=31536000, immutable" docs/ s3://trmccormick.com
      - aws s3 sync --exclude "*" --include "*.json" --cache-control "public, max-age=3600" docs/ s3://trmccormick.com
      - aws s3 sync --exclude "*" --include "*.webp" --include "*.jpg" --include "*.jpeg" --include "*.png" --include "*.gif" --include "*.svg" --cache-control "public, max-age=31536000, immutable" docs/ s3://trmccormick.com
      # Final sync with --delete to remove old files and catch any remaining files
      - aws s3 sync --delete docs/ s3://trmccormick.com
      - echo Creating CloudFront invalidation...
      - aws cloudfront create-invalidation --distribution-id E31546NI4VOO5F --paths '/*'
    finally:
      - echo Build finished
artifacts:
  files:
    - '**/*'
  base-directory: docs
  discard-paths: no