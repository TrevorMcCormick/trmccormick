{{- $params := .Scratch.Get "params" -}}
{{- $isHome := .IsHome -}}
{{- $title := .Title -}}
{{- $description := $params.description | default .Site.Params.description -}}

{{- /* JSON-LD Structured Data */ -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {{- if $isHome -}}
    {
      "@type": "WebSite",
      "@id": "{{ .Site.BaseURL }}#website",
      "url": "{{ .Site.BaseURL }}",
      "name": "{{ .Site.Title }}",
      "description": "{{ .Site.Params.description }}",
      "publisher": {
        "@id": "{{ .Site.BaseURL }}#person"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "{{ .Site.BaseURL }}?s={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    },
    {
      "@type": "Person",
      "@id": "{{ .Site.BaseURL }}#person",
      "name": "{{ .Site.Author.name }}",
      "url": "{{ .Site.BaseURL }}{{ .Site.Author.link }}",
      "email": "{{ .Site.Author.email }}",
      "sameAs": [
        {{- with .Site.Params.social.GitHub -}}"https://github.com/{{ . }}",{{- end -}}
        {{- with .Site.Params.social.Linkedin -}}"https://linkedin.com/in/{{ . }}",{{- end -}}
        {{- with .Site.Params.social.Instagram -}}"https://instagram.com/{{ . }}"{{- end -}}
      ]
    }
    {{- else if .IsPage -}}
    {
      "@type": "Article",
      "@id": "{{ .Permalink }}#article",
      "headline": "{{ $title }}",
      "description": "{{ $description }}",
      "url": "{{ .Permalink }}",
      {{- with .PublishDate -}}
      "datePublished": "{{ .Format "2006-01-02T15:04:05Z07:00" }}",
      {{- end -}}
      {{- with .Lastmod -}}
      "dateModified": "{{ .Format "2006-01-02T15:04:05Z07:00" }}",
      {{- end -}}
      "author": {
        "@type": "Person",
        "name": "{{ .Site.Author.name }}",
        "url": "{{ .Site.BaseURL }}{{ .Site.Author.link }}"
      },
      "publisher": {
        "@type": "Person",
        "name": "{{ .Site.Author.name }}",
        "url": "{{ .Site.BaseURL }}{{ .Site.Author.link }}"
      },
      {{- with .Params.tags -}}
      "keywords": "{{ delimit . ", " }}",
      {{- end -}}
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "{{ .Permalink }}"
      }
      {{- with .Params.image -}}
      ,
      "image": {
        "@type": "ImageObject",
        "url": "{{ . | absURL }}"
      }
      {{- else -}}
      {{- with $.Site.Params.images -}}
      ,
      "image": {
        "@type": "ImageObject",
        "url": "{{ index . 0 | absURL }}"
      }
      {{- end -}}
      {{- end -}}
    },
    {
      "@type": "BreadcrumbList",
      "@id": "{{ .Permalink }}#breadcrumb",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "{{ .Site.BaseURL }}"
        }
        {{- if .Section -}}
        ,{
          "@type": "ListItem",
          "position": 2,
          "name": "{{ .Section | title }}",
          "item": "{{ .Site.BaseURL }}{{ .Section }}/"
        }
        ,{
          "@type": "ListItem",
          "position": 3,
          "name": "{{ $title }}",
          "item": "{{ .Permalink }}"
        }
        {{- else -}}
        ,{
          "@type": "ListItem",
          "position": 2,
          "name": "{{ $title }}",
          "item": "{{ .Permalink }}"
        }
        {{- end -}}
      ]
    }
    {{- end -}}
  ]
}
</script>
